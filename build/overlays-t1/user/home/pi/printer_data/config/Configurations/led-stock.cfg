# LED / Caselight Settings (Stock)
# For FLSUN T1 — Ported from S1 Open Source Edition
# Version: 1.0


########################################
# Caselight Settings
########################################

# Caselight via host MCU hardware PWM
# Connected through USB hub board transistor circuit
# Requires pwmchip0 exported in /etc/rc.local:
#   echo 0 > /sys/class/pwm/pwmchip0/export

[output_pin caselight]
pin: host:pwmchip0/pwm0
pwm: True
hardware_pwm: True
cycle_time: 0.000001
value: 1.0

# Optional: Beeper via host MCU hardware PWM
# Requires pwmchip0/pwm1 exported in /etc/rc.local:
#   echo 1 > /sys/class/pwm/pwmchip0/export

#[output_pin beeper]
#pin: host:pwmchip0/pwm1
#pwm: True
#hardware_pwm: True
#value: 0
#shutdown_value: 0
#cycle_time: 0.0005
