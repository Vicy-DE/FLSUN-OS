#
# KlipperScreen Configurations
# For FLSUN T1 — Ported from S1 Open Source Edition
# Version: 1.0
#
# Changes from S1:
#   - Renamed printer to "FLSUN T1"
#   - Removed Drying_Box topbar sensors (T1 has no drying box)
#   - Removed S1-specific hidden macros (motor cal, drying box, camera, etc.)


########################################
# Printer Settings
########################################

[main]
# Set the password to use when locking the screen, this is not a secure system, it's saved as plain text,
# but it's intended to deter children or people present when printing.
#lock_password: flsun

[printer FLSUN T1]
moonraker_host: 127.0.0.1
moonraker_port: 7125
move_speed_xy: 150
move_speed_z: 100
extrude_distances: 5, 10, 15, 25
extrude_speeds: 5, 10, 15, 25


########################################
# Preheat Settings
########################################

[preheat PLA]
extruder = 230
heater_bed = 60

[preheat PETG]
extruder = 260
heater_bed = 80

[preheat TPU]
extruder = 240
heater_bed = 35

[preheat ABS]
extruder = 270
heater_bed = 90

[preheat ASA]
extruder = 280
heater_bed = 90

[preheat PA-CF]
extruder = 300
heater_bed = 100

[preheat cooldown]
gcode: M107


