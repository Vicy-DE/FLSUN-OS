#
# Klipper Configurations
# For FLSUN T1 — Ported from S1 Open Source Edition
# Version: 1.1
#
# Based on:
#   - S1 Open Source Edition by Guilouz (structure & macros)
#   - T1-pyro by mulcmu (hardware pins & MCU config)
#
# Requirements:
#   - Klipper fork: garethky/klipper (load-cell-probe-community-testing branch)
#   - SciPy installed in klippy-env (for load cell notch filter)
#   - klipper_mcu Linux service (for host PWM caselight)
#   - LoadCell MCU firmware flashed to secondary STM32F103
#
# Hardware: FLSUN T1 / T1 Pro
#   - SoC: Rockchip RV1109 (dual-core Cortex-A7)
#   - MCU: GD32F303 (STM32F103xe compatible), 72 MHz
#   - Stepper drivers: TMC5160 via SPI (dedicated per-driver buses)
#   - Probe: Strain gauge (HX717 load cell on secondary MCU)
#   - Display: 800×480 RGB parallel panel


########################################
# Included Files
########################################

[include config.cfg]
[include Configurations/macros.cfg]


########################################
# MCU Settings
########################################

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu host]
serial: /tmp/klipper_host_mcu

[mcu LoadCell]
serial: /dev/ttyS0
restart_method: command
baud: 250000


########################################
# Printer Settings
########################################

[printer]
kinematics: delta
max_velocity: 1000
max_accel: 30000
minimum_cruise_ratio: 0.5
square_corner_velocity: 5
max_z_velocity: 1000
delta_radius: 171.822312
print_radius: 133
minimum_z_position: -5


########################################
# X Stepper Motor (A Tower)
########################################

[stepper_a]
step_pin: PE5
dir_pin: !PD7
enable_pin: !PE1
microsteps: 32
rotation_distance: 60
endstop_pin: ^PD4
homing_speed: 40
homing_retract_dist: 2.5
second_homing_speed: 2.5
# Calibrated values (per-machine — update after DELTA_CALIBRATE):
angle: 210.068157
arm_length: 333.541020
position_endstop: 330.546

[tmc5160 stepper_a]
cs_pin: PB4
spi_software_sclk_pin: PE0
spi_software_miso_pin: PB3
spi_software_mosi_pin: PD5
sense_resistor: 0.0375
run_current: 3
hold_current: 1.6
stealthchop_threshold: 0
interpolate: True


########################################
# Y Stepper Motor (B Tower)
########################################

[stepper_b]
step_pin: PB9
dir_pin: !PC7
enable_pin: !PD3
microsteps: 32
rotation_distance: 60
endstop_pin: ^PD14
# Calibrated values (per-machine — update after DELTA_CALIBRATE):
angle: 329.998346
arm_length: 335.415210
position_endstop: 331.930

[tmc5160 stepper_b]
cs_pin: PC6
spi_software_sclk_pin: PD0
spi_software_miso_pin: PA8
spi_software_mosi_pin: PD1
sense_resistor: 0.0375
run_current: 3
hold_current: 1.6
stealthchop_threshold: 0
interpolate: True


########################################
# Z Stepper Motor (C Tower)
########################################

[stepper_c]
step_pin: PB8
dir_pin: !PE15
enable_pin: !PD13
microsteps: 32
rotation_distance: 60
endstop_pin: ^PE10
# Calibrated values (per-machine — update after DELTA_CALIBRATE):
angle: 90.268900
arm_length: 336.463818
position_endstop: 331.505

[tmc5160 stepper_c]
cs_pin: PD9
spi_software_sclk_pin: PD10
spi_software_miso_pin: PD8
spi_software_mosi_pin: PD11
sense_resistor: 0.0375
run_current: 3
hold_current: 1.6
stealthchop_threshold: 0
interpolate: True


########################################
# Extruder & Driver Settings
########################################

[extruder]
step_pin: PD15
dir_pin: !PB0
enable_pin: !PB1
microsteps: 16
rotation_distance: 4.5
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA5
sensor_type: Generic 3950
pullup_resistor: 510
sensor_pin: PA4
min_temp: 0
max_temp: 320
max_extrude_cross_section: 50
max_extrude_only_distance: 500
min_extrude_temp: 180
pressure_advance: 0.025
pressure_advance_smooth_time: 0.040
control: pid
pid_kp: 18.049
pid_ki: 0.970
pid_kd: 83.929

[tmc5160 extruder]
cs_pin: PC4
spi_software_sclk_pin: PA7
spi_software_mosi_pin: PA6
spi_software_miso_pin: PC5
sense_resistor: 0.0375
run_current: 1.2
hold_current: 0.3
interpolate: True
stealthchop_threshold: 0


########################################
# Bed Settings
########################################

[heater_bed]
heater_pin: PA2
sensor_pin: PA1
sensor_type: Generic 3950
min_temp: -5
max_temp: 130
control: pid
pid_kp: 76.182
pid_ki: 1.582
pid_kd: 917.041

[bed_mesh]
speed: 50
horizontal_move_z: 10
mesh_radius: 100
mesh_origin: 0,0
round_probe_count: 7
algorithm: bicubic
fade_start: 0.2
fade_end: 5
fade_target: 0

[delta_calibrate]
radius: 123.5
horizontal_move_z: 5
speed: 100


########################################
# Probe Settings (Load Cell)
########################################

# Requires garethky/klipper load-cell-probe-community-testing fork
# Requires SciPy: ~/klippy-env/bin/pip install scipy

[load_cell_probe]
sensor_type: hx717
sclk_pin: LoadCell:PB9
dout_pin: LoadCell:PB8
sensor_orientation: inverted
counts_per_gram: 68.54675
reference_tare_counts: 1465556
force_safety_limit: 1000
trigger_force: 75
z_offset: 0.0
speed: 2.0
samples: 5
samples_result: average
sample_retract_dist: 1
samples_tolerance: 0.01
samples_tolerance_retries: 5
notch_filter_frequencies: 60
notch_filter_quality: 6.0

[simple_tap_classifier]
# All defaults — uncomment and tune as needed:
#min_decompression_force_percentage: 66.6
#max_baseline_force_change_percentage: 50
#compression_start_angle_range: 70, 110
#compression_end_angle_range: 70, 110
#decompression_start_angle_range: 95, 135
#decompression_end_angle_range: 95, 135

[endstop_phase]


########################################
# Temperature Controls
########################################

[verify_heater extruder]
max_error: 150
check_gain_time: 20
hysteresis: 6
heating_gain: 2

[verify_heater heater_bed]
max_error: 200
check_gain_time: 60
hysteresis: 5
heating_gain: 0.5


########################################
# Temperature Sensors
########################################

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor motherboard]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100


########################################
# Homing Override
########################################

[homing_override]
gcode:
  G28
  G91
  G0 Z-5 F3000
  G90
  G0 X0 Y0 F3000


########################################
# Relay Settings
########################################

[output_pin _relay]
pin: PD6
pwm: False
value: 0


########################################
# G-Code Features & Events
########################################

[idle_timeout]
gcode:
  {% if printer["gcode_macro RESUME"].m600_state == 1 %}
    RESPOND MSG="Nozzle heating stopped for inactivity! Heat nozzle and load new filament before resuming!"
    M104 S0
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  {% elif not printer.pause_resume.is_paused %}
    {% if printer.extruder.target > 0 %}
      RESPOND MSG="Timeout reached: Turning off hotend..."
      M104 S0
    {% endif %}
    {% if printer.heater_bed.target > 0 %}
      RESPOND MSG="Timeout reached: Turning off bed..."
      M140 S0
    {% endif %}
    {% if printer.toolhead.homed_axes != "" %}
      RESPOND MSG="Timeout reached: Homing to disable stepper motors..."
      G28
      M84
    {% endif %}
  {% endif %}
timeout: 900

[pause_resume]

[virtual_sdcard]
path: ~/printer_data/gcodes

[save_variables]
filename: ~/printer_data/config/Configurations/variables.cfg

[gcode_arcs]
resolution: 1.0

[display_status]

[exclude_object]

[respond]

[force_move]
enable_force_move: True


########################################
# Input Shaper Settings
########################################

[adxl345]
cs_pin: PE11
spi_speed: 100000
spi_software_sclk_pin: PE14
spi_software_mosi_pin: PE13
spi_software_miso_pin: PE12
rate: 1600

[resonance_tester]
probe_points: 0, 0, 20
accel_chip: adxl345
move_speed: 100

[input_shaper]
# Calibrated values (per-machine — update after SHAPER_CALIBRATE):
shaper_type_x: 3hump_ei
shaper_freq_x: 80.0
shaper_type_y: 3hump_ei
shaper_freq_y: 84.2
