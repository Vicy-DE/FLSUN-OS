#
# Filament Sensor Settings (Stock — 3 sensors)
# For FLSUN T1 — Ported from S1 Open Source Edition
# Version: 1.0


########################################
# Filament Sensor Settings
########################################

# Effector switch sensor — detects filament presence at the effector
[filament_switch_sensor effector_switch]
pause_on_runout: False
event_delay: 3.0
debounce_delay: 2.0
switch_pin: !PE7
runout_gcode:
  {% if printer.print_stats.state == "printing" %}
    RESPOND TYPE=error MSG="Filament runout detected at effector!"
    M600
  {% endif %}

# BTT switch sensor — detects filament presence at entry
[filament_switch_sensor btt_switch]
pause_on_runout: True
event_delay: 1.0
debounce_delay: 0.5
switch_pin: ^PA13
runout_gcode:
  {% if printer.print_stats.state == "printing" %}
    RESPOND TYPE=error MSG="Filament runout detected!"
  {% endif %}

# BTT motion sensor — detects filament movement
[filament_motion_sensor btt_motion]
switch_pin: ^PA14
detection_length: 5
extruder: extruder
pause_on_runout: False
runout_gcode:
  {% if printer.print_stats.state == "printing" %}
    {% if printer["filament_switch_sensor btt_switch"].filament_detected %}
      RESPOND TYPE=error MSG="Filament stuck detected!"
      M600
    {% endif %}
  {% endif %}
insert_gcode:
  M117 Filament encoder inserted
