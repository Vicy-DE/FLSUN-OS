#
# Fan Settings (Silent Kit / T1 Pro)
# For FLSUN T1 — Ported from S1 Open Source Edition
# Version: 1.0
#
# Use this config instead of fan-stock.cfg when the Silent Upgrade Kit
# is installed (or on a T1 Pro, which ships with the silent fan).
#
# Changes from stock:
#   - Part fan max_power reduced from 0.8 to 0.6 for the quieter CPAP blower
#   - Part fan cycle_time increased from 0.00005 to 0.0001 (slower PWM for CPAP)
#   - All other fan settings remain identical to stock


########################################
# Fan Settings
########################################

# Part cooling fan — quieter CPAP blower, reduced max power
# T1 Pro stock values: max_power 0.6, cycle_time 0.0001
# The silent kit CPAP fan has lower airflow capacity than stock.
# max_power is reduced to prevent over-driving the quieter fan.
[fan]
pin: !PE6
cycle_time: 0.0001
max_power: 0.6
kick_start_time: 0.0

# Heatsink fan — hysteresis-based control via display template
# Turns on at 50°C extruder temp or when target >50°C, off below 35°C
# (Unchanged from stock — the silent kit does not replace this fan)
[display_template HEATSINK_FAN]
text:
  {% set temp = printer['extruder'].temperature %}
  {% set speed = printer['fan_generic heat_sink_fan'].speed %}
  {% set set_temp = printer['extruder'].target %}
  {% if temp < 35 and set_temp == 0 %}
    { "0.0" }
  {% elif temp >= 50 or set_temp > 50 %}
    { "1.0" }
  {% else %}
    { speed | round(1) }
  {% endif %}

[fan_generic heat_sink_fan]
pin: PE8
shutdown_speed: 1.0

[delayed_gcode _START_HEATSINK_FAN]
initial_duration: 1.
gcode:
  SET_FAN_SPEED FAN=heat_sink_fan TEMPLATE=HEATSINK_FAN
